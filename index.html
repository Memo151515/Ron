<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ron B-Bot</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: pointer;
        }

        /* Ron'un Yüz Konteyneri */
        .ron-face {
            width: 80%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 80px;
        }

        /* Pikselli Göz Yapısı */
        .eyes {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .eye {
            width: 80px;
            height: 120px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255,255,255,0.8);
            position: relative;
        }

        /* Ron'un meşhur pikselli ağzı */
        .mouth {
            width: 180px;
            height: 25px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(255,255,255,0.8);
            transition: all 0.05s ease-in-out;
        }

        /* Konuşma sırasında pikselli dalgalanma */
        .talking {
            animation: ronSpeak 0.1s infinite alternate;
        }

        @keyframes ronSpeak {
            0% { height: 15px; width: 180px; transform: scaleY(1); }
            100% { height: 60px; width: 200px; transform: scaleY(1.2); border-radius: 20px; }
        }

        /* Göz kırpma */
        .blink {
            animation: ronBlink 0.25s forwards;
        }

        @keyframes ronBlink {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0); }
        }

        /* Gizli Bilgi Yazısı */
        #status {
            position: absolute;
            bottom: 20px;
            color: #111; /* Neredeyse görünmez */
            font-family: monospace;
            font-size: 10px;
        }
    </style>
</head>
<body onclick="ronDinle()">

    <div class="ron-face">
        <div class="eyes">
            <div id="eyeL" class="eye"></div>
            <div id="eyeR" class="eye"></div>
        </div>
        <div id="mouth" class="mouth"></div>
    </div>

    <div id="status">Dinlemek için tıkla...</div>

    <script>
        const mouth = document.getElementById('mouth');
        const eyeL = document.getElementById('eyeL');
        const eyeR = document.getElementById('eyeR');
        const status = document.getElementById('status');

        // Ses Tanıma
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';

        // Ses Sentezi
        const synth = window.speechSynthesis;

        // Otomatik Göz Kırpma
        function randomBlink() {
            const delay = Math.random() * 3000 + 2000;
            setTimeout(() => {
                eyeL.classList.add('blink');
                eyeR.classList.add('blink');
                setTimeout(() => {
                    eyeL.classList.remove('blink');
                    eyeR.classList.remove('blink');
                    randomBlink();
                }, 250);
            }, delay);
        }
        randomBlink();

        function ronDinle() {
            try {
                recognition.start();
                status.innerText = "Ron dinliyor...";
            } catch(e) {}
        }

        recognition.onresult = (event) => {
            const soru = event.results[0][0].transcript;
            
            // Burası Ron'un "zeka" kısmı
            // Normalde API lazım ama basit sorulara cevap verebilir
            let cevap = "";
            
            if(soru.includes("nasılsın")) {
                cevap = "Ben iyiyim, sen benim en iyi arkadaşımsın!";
            } else if(soru.includes("kimsin")) {
                cevap = "Ben Ron, kutudan çıktığı gibi olan tek arkadaşın.";
            } else {
                // Her şeyi bilmediğinde Ron gibi cevap verir
                cevap = soru + " hakkında pek bir şey bilmiyorum ama seninle olmayı seviyorum!";
            }

            konus(cevap);
        };

        function konus(metin) {
            const mesaj = new SpeechSynthesisUtterance(metin);
            mesaj.lang = 'tr-TR';
            mesaj.pitch = 1.3; // Ron'un ince sesi
            mesaj.rate = 1.0;

            mesaj.onstart = () => {
                mouth.classList.add('talking');
            };

            mesaj.onend = () => {
                mouth.classList.remove('talking');
            };

            synth.speak(mesaj);
        }
    </script>
</body>
</html>
