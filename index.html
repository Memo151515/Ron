<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ron B-Bot (Film Sesi)</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .ron-face {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 70px;
        }

        .eyes {
            display: flex;
            gap: 90px;
        }

        .eye {
            width: 75px;
            height: 110px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
        }

        .mouth {
            width: 170px;
            height: 18px;
            background-color: #fff;
            border-radius: 6px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        /* Konuşma Animasyonu (Pikselli Bozulma) */
        .talking {
            animation: ronSpeak 0.08s infinite alternate;
        }

        @keyframes ronSpeak {
            from { height: 18px; transform: scaleX(1); border-radius: 6px; }
            to { height: 60px; transform: scaleX(1.1); border-radius: 25px; }
        }

        .blink { transform: scaleY(0.05); transition: 0.1s; }

        #msg { position: absolute; bottom: 15px; color: #111; font-family: sans-serif; font-size: 10px; }
    </style>
</head>
<body onclick="ronStart()">

    <div class="ron-face">
        <div class="eyes">
            <div id="eyeL" class="eye"></div>
            <div id="eyeR" class="eye"></div>
        </div>
        <div id="mouth" class="mouth"></div>
    </div>
    <div id="msg">Ron Başlatılıyor...</div>

    <script>
        const mouth = document.getElementById('mouth');
        const eyeL = document.getElementById('eyeL');
        const eyeR = document.getElementById('eyeR');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'tr-TR';
        recognition.continuous = false;

        const synth = window.speechSynthesis;
        let active = false;

        function ronStart() {
            if(!active) {
                active = true;
                listen();
            }
        }

        function listen() {
            try { recognition.start(); } catch(e) {}
        }

        // Rastgele Göz Kırpma
        setInterval(() => {
            eyeL.classList.add('blink');
            eyeR.classList.add('blink');
            setTimeout(() => {
                eyeL.classList.remove('blink');
                eyeR.classList.remove('blink');
            }, 150);
        }, 3000);

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript.toLowerCase();
            handleRonAI(text);
        };

        recognition.onend = () => {
            if(active && !synth.speaking) listen();
        };

        function handleRonAI(text) {
            let response = "";
            
            if(text.includes("selam") || text.includes("ron")) {
                response = "Selam! Ben senin en iyi arkadaşınım! Hadi oyun oynayalım!";
            } else if(text.includes("nasılsın")) {
                response = "Harikayım! Verilerim biraz karışık ama arkadaşlığımız mükemmel!";
            } else if(text.includes("saat")) {
                response = "Şu an tam arkadaşlık vakti! Absalom!";
            } else {
                response = text + " mi? Bu çok ilginç! Veritabanıma kaydediyorum!";
            }
            
            speakRon(response);
        }

        function speakRon(text) {
            const utter = new SpeechSynthesisUtterance(text);
            
            // FİLMDEKİ SES AYARLARI (TÜRKÇE DUBLAJ TARAFI)
            utter.lang = 'tr-TR';
            utter.pitch = 1.6; // Sesi oldukça tiz yapar (Ron'un sesi gibi)
            utter.rate = 1.3;  // Hızlı ve heyecanlı konuşmasını sağlar
            utter.volume = 1;

            utter.onstart = () => mouth.classList.add('talking');
            utter.onend = () => {
                mouth.classList.remove('talking');
                listen(); // Konuşma biter bitmez dinlemeye dön
            };

            synth.speak(utter);
        }
    </script>
</body>
</html>
