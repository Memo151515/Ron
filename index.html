<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ron B-Bot AI (Erkek Sesi)</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; cursor: pointer; }
        .ron-face { display: flex; flex-direction: column; align-items: center; gap: 60px; }
        .eyes { display: flex; gap: 100px; }
        .eye { width: 80px; height: 115px; background-color: #fff; border-radius: 12px; box-shadow: 0 0 35px #fff; }
        .mouth { width: 170px; height: 15px; background-color: #fff; border-radius: 6px; box-shadow: 0 0 20px #fff; transition: 0.05s; }
        .talking { animation: ronTalk 0.1s infinite alternate; }
        @keyframes ronTalk { from { height: 15px; } to { height: 65px; border-radius: 25px; } }
        .blink { transform: scaleY(0.05); }
    </style>
</head>
<body onclick="startRon()">

    <div class="ron-face">
        <div class="eyes">
            <div id="eyeL" class="eye"></div>
            <div id="eyeR" class="eye"></div>
        </div>
        <div id="mouth" class="mouth"></div>
    </div>

    <script>
        const mouth = document.getElementById('mouth');
        const eyeL = document.getElementById('eyeL');
        const eyeR = document.getElementById('eyeR');

        let ronMemory = {
            "selam": "Selam en iyi arkadaşım! Ben Ron!",
            "nasılsın": "Süperim! Arkadaşlık seviyem yüzde yüz!",
            "absalom": "Absalom! Absalooom!"
        };

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'tr-TR';
        const synth = window.speechSynthesis;
        let active = false;
        let lastQuestion = "";
        let selectedVoice = null;

        // Cihazdaki erkek sesini bulma
        function setVoice() {
            let voices = synth.getVoices();
            // Türkçe ve tercihen erkek (Google Türkçe gibi) bir ses ara
            selectedVoice = voices.find(v => v.lang.includes('tr') && (v.name.includes('Male') || v.name.includes('Erkek'))) 
                            || voices.find(v => v.lang.includes('tr'));
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = setVoice;
        }

        function startRon() {
            if(!active) { active = true; setVoice(); listen(); }
        }

        function listen() {
            try { recognition.start(); } catch(e) {}
        }

        setInterval(() => {
            eyeL.classList.add('blink'); eyeR.classList.add('blink');
            setTimeout(() => { eyeL.classList.remove('blink'); eyeR.classList.remove('blink'); }, 150);
        }, 3800);

        recognition.onresult = (event) => {
            const input = event.results[0][0].transcript.toLowerCase();
            
            if (lastQuestion !== "") {
                ronMemory[lastQuestion] = input;
                lastQuestion = "";
                speakRon("Tamam, bunu veritabanıma ekledim!");
                return;
            }

            let found = false;
            for (let key in ronMemory) {
                if (input.includes(key)) {
                    speakRon(ronMemory[key]);
                    found = true;
                    break;
                }
            }

            if (!found) {
                lastQuestion = input;
                speakRon(input + " nedir? Lütfen bana açıkla!");
            }
        };

        recognition.onend = () => { if(active && !synth.speaking) listen(); };

        function speakRon(text) {
            const utter = new SpeechSynthesisUtterance(text);
            if (selectedVoice) utter.voice = selectedVoice;
            
            utter.lang = 'tr-TR';
            // ERKEK SESİ AYARLARI
            utter.pitch = 0.9; // 1.0 altı sesi kalınlaştırır (Erkek tonu)
            utter.rate = 1.2;  // Ron'un hızlı konuşma tarzı
            
            utter.onstart = () => mouth.classList.add('talking');
            utter.onend = () => {
                mouth.classList.remove('talking');
                setTimeout(listen, 400);
            };
            synth.speak(utter);
        }
    </script>
</body>
</html>
